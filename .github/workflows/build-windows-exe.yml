name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build SPXBot.exe
        run: |
          pyinstaller `
            --name SPXBot `
            --onefile `
            --clean `
            --noconsole `
            --add-data ".env.example;." `
            --hidden-import ib_insync `
            spx_options_bot\desktop_app.py
          copy .env.example dist\.env

      - name: Sign SPXBot.exe
        if: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}"))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -like "*\x64\signtool.exe" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe not found"
          }
          & $signtool.FullName sign `
            /f $certPath `
            /p "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            dist\SPXBot.exe
          Remove-Item $certPath -Force

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: SPXBot-Windows
          path: |
            dist/SPXBot.exe
            dist/.env
            README.md
